name: GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'reports/**'
      - 'scripts/**'
      - 'templates/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Debug - List Files
        run: |
          echo "=== Debug Info ==="
          echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE"
          echo "PWD: $(pwd)"
          echo "=== Root directory ==="
          ls -la
          echo "=== Scripts directory ==="
          ls -la scripts/ || echo "scripts/ not found"
          echo "=== Templates directory ==="
          ls -la templates/ || echo "templates/ not found"
          echo "=== Reports directory ==="
          ls -la reports/ || echo "reports/ not found"
          echo "=== Python version ==="
          python3 --version
          echo "=== Python path ==="
          which python3
          echo "=== Running generate_index.py ==="
      
      - name: Generate Index
        run: |
          python3 scripts/generate_index.py 2>&1
          echo "=== Exit code: $? ==="
        working-directory: ${{ github.workspace }}
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: |
            index.html
            reports/
          
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ needs.deploy.pages.url }}
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4