name: GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'reports/**'
      - 'scripts/**'
      - 'templates/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Generate Index
        run: |
          python3 scripts/generate_index.py
        working-directory: ${{ github.workspace }}
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: |
            index.html
            reports/
          
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ needs.deploy.pages.url }}
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4